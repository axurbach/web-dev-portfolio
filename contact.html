<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander Urbach | Contact</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/pages/contact.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Red+Hat+Mono:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
</head>
<body class="contact-page">
    <header class="header">
        <a href="index.html" class="header-wordmark">Alexander :: Urbach</a>
        <nav class="header-nav" aria-label="Primary navigation">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="is-active">Contact</a>
        </nav>
    </header>

    <main class="main">
        <section class="contact-panel" aria-labelledby="contact-title">
            <h1 id="contact-title" class="contact-title">Contact</h1>
            <p class="contact-intro">Available for freelance projects, collaborations, and full-time roles.</p>

            <form class="contact-form" action="https://formspree.io/f/mwvnpvpv" method="POST">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your name" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="Your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Tell me about your project" required></textarea>

                <button type="submit">Send Message</button>
            </form>

            <p class="contact-direct">Or email directly: <a href="mailto:axurbach@gmail.com">axurbach@gmail.com</a></p>
        </section>
    </main>

    <footer class="footer">
        <span class="footer-copy">&copy; Alexander Urbach 2026</span>
        <span class="footer-label">Web Development Portfolio</span>
    </footer>
</body>
</html>
